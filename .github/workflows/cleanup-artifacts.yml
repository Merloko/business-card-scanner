name: Cleanup old artifacts

on:
  schedule:
    - cron: '0 2 * * *'  # daily at 2am UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Delete artifacts older than 7 days
        uses: actions/github-script@v7
        with:
          script: |
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 7);

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );

            let deleted = 0;
            for (const artifact of artifacts) {
              if (new Date(artifact.created_at) < cutoff) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                console.log(`Deleted: ${artifact.name} (${artifact.id})`);
                deleted++;
              }
            }
            console.log(`Done. Deleted ${deleted} artifact(s).`);

      - name: Delete all caches
        uses: actions/github-script@v7
        with:
          script: |
            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );

            let deleted = 0;
            for (const cache of caches) {
              await github.rest.actions.deleteActionsCacheById({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id,
              });
              console.log(`Deleted cache: ${cache.key} (${cache.id}) — ${(cache.size_in_bytes / 1024 / 1024).toFixed(1)} MB`);
              deleted++;
            }
            console.log(`Done. Deleted ${deleted} cache(s).`);
